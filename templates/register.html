{{define "title"}}Sign Up — Bloom{{end}}
{{define "content"}}
<div class="auth-page">
    <div class="auth-card">
        <h1>Create Account 🌱</h1>
        <p class="auth-subtitle">Start tracking your cycle</p>

        <form method="POST" action="/register" class="auth-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required autofocus placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8" placeholder="At least 8 characters">
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
    </div>
</div>
{{end}}
