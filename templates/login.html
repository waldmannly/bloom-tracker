{{define "title"}}Log In — Bloom{{end}}
{{define "content"}}
<div class="auth-page">
    <div class="auth-card">
        <h1>Welcome Back 🌸</h1>
        <p class="auth-subtitle">Log in to your account</p>

        <form method="POST" action="/login" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Log In</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="/register">Sign up</a></p>
        <p class="auth-footer">Joining as a partner? <a href="/partner/join">Enter invite code</a></p>
    </div>
</div>
{{end}}
